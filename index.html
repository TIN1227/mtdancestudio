    <meta charset="UTF-8">

    <title>MT DANCE STUDIO</title>
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff4081;
            --bg-dark: #0a192f;
        }
        body { 
            background: var(--bg-dark); color: white; display: flex; 
            justify-content: center; padding: 40px 20px; 
            font-family: 'Noto Sans TC', sans-serif; min-height: 100vh;
        }
        .container { width: 100%; max-width: 450px; text-align: center; }
        
        .logo-main { font-size: 72px; font-weight: 900; background: linear-gradient(to right, #ffffff, var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-sub { font-size: 20px; color: var(--neon-pink); letter-spacing: 6px; margin-bottom: 30px; font-weight: 700; }
        
        /* 調整間距解決擁擠：增加 margin */
        input { 
            width: 100%; padding: 18px; margin: 15px 0; border-radius: 12px; 
            border: 1px solid #333; background: #172a45; color: white; 
            font-size: 18px; text-align: center; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 18px; margin-top: 25px; 
            background: var(--neon-cyan); color: #000; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 20px; cursor: pointer; 
        }

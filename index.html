<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT DANCE STUDIO | 學員查詢系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #060d1a; 
            --card-bg: rgba(16, 39, 74, 0.7); 
            --neon-cyan: #00f0ff; 
            --text-color: #ffffff; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }

        body { 
            background: radial-gradient(circle at center, #1a2a44 0%, #060d1a 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            color: var(--text-color);
        }

        .container { 
            width: 100%; 
            max-width: 400px; 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            border-radius: 20px; 
            padding: 40px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { margin-bottom: 25px; font-size: 24px; letter-spacing: 2px; color: var(--neon-cyan); }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 10px; 
            border: 1px solid #334; 
            background: #0a192f; 
            color: white; 
            font-size: 16px;
        }

        button { 
            width: 100%; 
            padding: 15px; 
            margin-top: 20px; 
            border-radius: 10px; 
            border: none; 
            background: var(--neon-cyan); 
            color: #060d1a; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; transform: scale(1.02); }

        #result { margin-top: 25px; padding: 20px; border-top: 1px solid #2d3748; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>MT DANCE STUDIO</h1>
    <input type="text" id="name" placeholder="請輸入姓名">
    <input type="number" id="phone" placeholder="請輸入手機末三碼">
    <button id="btn" onclick="query()">查詢剩餘課程</button>
    <div id="result">
        <p>剩餘堂數: <span id="count">-</span></p>
        <p>到期日期: <span id="date">-</span></p>
    </div>
</div>

<script>
    // 請將這裡換成您 GAS 部署後的 Web App URL (結尾為 /exec)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzqlyM74EFClkBS5BfxFpJOB-P2MJyvcWCqMicKGR2FzGimtO7bZRddu2gLiYUOH9OnfQ/exec"; 

    async function query() {
        const btn = document.getElementById('btn');
        const resDiv = document.getElementById('result');
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;

        if(!name || !phone) { alert("請填寫完整資料"); return; }

        btn.innerText = "查詢中...";
        try {
            // 注意：跨網域請求需確保 GAS 端有處理回應
            const response = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ name, phone })
            });
            const data = await response.json();
            
            document.getElementById('count').innerText = data.remaining;
            document.getElementById('date').innerText = data.expiry;
            resDiv.style.display = "block";
        } catch(e) {
            alert("查詢失敗，請檢查網路或系統設定");
        } finally {
            btn.innerText = "查詢剩餘課程";
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT DANCE STUDIO | 學員查詢系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff4081;
            --bg-dark: #0a192f;
        }
        body { background: var(--bg-dark); color: white; display: flex; justify-content: center; padding: 20px; font-family: sans-serif; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        
        /* LOGO 設計 */
        .logo-main { 
            font-size: 60px; font-weight: 900; 
            background: linear-gradient(to right, #ffffff, var(--neon-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo-sub { font-size: 16px; color: var(--neon-pink); letter-spacing: 4px; margin-bottom: 30px; }
        h2 { font-size: 18px; color: #fff; margin-bottom: 20px; font-weight: 400; }

        /* 輸入框與按鈕 */
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #172a45; color: white; }
        button { width: 100%; padding: 12px; margin-top: 15px; background: var(--neon-cyan); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 查詢結果區 */
        #result { margin-top: 30px; padding: 20px; border: 1px solid #333; border-radius: 12px; display: none; }
        .result-label { font-size: 16px; margin: 10px 0; }
        .count-val { font-size: 48px; color: var(--neon-cyan); font-weight: 900; }
        .date-val { color: var(--neon-pink); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-main">MT</div>
    <div class="logo-sub">DANCE STUDIO</div>
    <h2>剩餘堂數查詢系統</h2>

    <input type="text" id="name" placeholder="請輸入姓名">
    <input type="number" id="phone" placeholder="請輸入手機末三碼">
    <button id="btn" onclick="query()">查詢</button>

    <div id="result">
        <div class="result-label">剩餘堂數</div>
        <div id="count" class="count-val">-</div>
        <div class="result-label">到期日期：<span id="date" class="date-val">-</span></div>
    </div>
</div>

<script>
    // 您的 JSONP 請求函數保持不變
    function sendJsonpRequest(url, callbackName) {
        return new Promise((resolve) => {
            window[callbackName] = (data) => {
                delete window[callbackName];
                document.body.removeChild(script);
                resolve(data);
            };
            const script = document.createElement('script');
            script.src = `${url}${url.includes('?') ? '&' : '?'}callback=${callbackName}`;
            document.body.appendChild(script);
        });
    }

    async function query() {
        const btn = document.getElementById('btn');
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        if (!name || !phone) { alert("請填寫資料"); return; }

        btn.innerText = "查詢中...";
        // 記得將您的 URL 換上去
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyNNNRJK1duf5WLOEk-8UL2Q1JzDLzOyDv2u8BQd8SbAkzNKGrQyXTYTom4CKlzUSD7XA/exec"; 
        const url = `${GAS_URL}?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`;
        const data = await sendJsonpRequest(url, "jsonp_" + Date.now());

        if (data.status === "success") {
            document.getElementById('result').style.display = 'block';
            document.getElementById('count').innerText = data.remaining;
            document.getElementById('date').innerText = data.expiry;
        } else {
            alert("查無此學員");
        }
        btn.innerText = "查詢";
    }
</script>
</body>
</html>

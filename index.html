<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT DANCE STUDIO | 學員查詢系統</title>
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-pink: #ff4081;
            --bg-dark: #0a192f;
        }
        body { 
            background: var(--bg-dark); color: white; display: flex; 
            justify-content: center; padding: 50px 20px; 
            font-family: 'Noto Sans TC', sans-serif; min-height: 100vh;
        }
        .container { width: 100%; max-width: 450px; text-align: center; }
        
        .logo-main { 
            font-size: 72px; font-weight: 900; 
            background: linear-gradient(to right, #ffffff, var(--neon-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo-sub { font-size: 20px; color: var(--neon-pink); letter-spacing: 6px; margin-bottom: 40px; font-weight: 700; }
        h2 { font-size: 22px; color: #fff; margin-bottom: 40px; font-weight: 400; }

        /* 這裡調整間距：加大 margin 讓輸入框不再擁擠 */
        input { 
            width: 100%; padding: 22px; margin: 25px 0; border-radius: 15px; 
            border: 1px solid #333; background: #172a45; color: white; 
            font-size: 20px; text-align: center; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 22px; margin-top: 30px; 
            background: var(--neon-cyan); color: #000; border: none; 
            border-radius: 15px; font-weight: bold; font-size: 22px; cursor: pointer; 
        }

        /* 強制初始隱藏 */
        #result { 
            margin-top: 60px; padding: 40px; border: 2px solid var(--neon-cyan); 
            border-radius: 20px; display: none !important; background: rgba(255,255,255,0.05);
        }
        .result-label { font-size: 22px; margin: 20px 0; color: #cbd5e1; }
        .count-val { font-size: 72px; color: var(--neon-cyan); font-weight: 900; margin: 20px 0; display: block; }
        .date-val { color: var(--neon-pink); font-weight: bold; font-size: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-main">MT</div>
    <div class="logo-sub">DANCE STUDIO</div>
    <h2>剩餘堂數查詢系統</h2>

    <input type="text" id="name" placeholder="請輸入姓名">
    <input type="number" id="phone" placeholder="請輸入手機末三碼">
    <button id="btn" onclick="query()">查詢</button>

    <div id="result">
        <div class="result-label">剩餘堂數</div>
        <div id="count" class="count-val">-</div>
        <div class="result-label">到期日期：<span id="date" class="date-val">-</span></div>
    </div>
</div>

<script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyNNNRJK1duf5WLOEk-8UL2Q1JzDLzOyDv2u8BQd8SbAkzNKGrQyXTYTom4CKlzUSD7XA/exec"; 

    function sendJsonpRequest(url, callbackName) {
        return new Promise((resolve) => {
            window[callbackName] = (data) => {
                delete window[callbackName];
                document.body.removeChild(script);
                resolve(data);
            };
            const script = document.createElement('script');
            script.src = `${url}${url.includes('?') ? '&' : '?'}callback=${callbackName}`;
            document.body.appendChild(script);
        });
    }

    async function query() {
        const btn = document.getElementById('btn');
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const resultDiv = document.getElementById('result');

        if (!name || !phone) { alert("請完整輸入姓名與手機末三碼"); return; }

        btn.innerText = "查詢中...";
        btn.disabled = true;

        try {
            const url = `${GAS_API_URL}?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`;
            const data = await sendJsonpRequest(url, "jsonp_" + Date.now());

            if (data.status === "success") {
                // 這裡動態更改 style，覆蓋掉 CSS 的 display:none
                resultDiv.style.display = 'block';
                document.getElementById('count').innerText = data.remaining;
                document.getElementById('date').innerText = data.expiry;
            } else {
                resultDiv.style.display = 'none';
                alert("查無資料，請再確認姓名與手機末三碼");
            }
        } catch (err) {
            alert("伺服器連線異常");
        } finally {
            btn.innerText = "查詢剩餘課程";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>

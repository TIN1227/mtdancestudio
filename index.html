<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT DANCE STUDIO | 學員查詢系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #0a192f; 
            --card-bg: rgba(16, 39, 74, 0.65); 
            --neon-cyan: #00f0ff; 
            --neon-pink: #ff4081; 
            --text-color: #f8fafc; 
        }

        body { 
            background: linear-gradient(135deg, #060d1a 0%, #0a192f 100%); 
            color: var(--text-color); 
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

       /* 背景霓虹光暈裝飾 */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
        }
       body::before { top: -50px; left: -50px; background: var(--primary-blue); }
       body::after { bottom: -50px; right: -50px; background: var(--neon-pink); }

        .container { 
            width: 95%; 
            max-width: 480px; 
            background: var(--card-bg); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px; 
            padding: 40px 25px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); 
            text-align: center; 
        }

        /* 兩行式 Logo 設計 */
        .logo-top { 
            font-size: 70px; 
            font-weight: 900; 
            line-height: 1; 
            background: linear-gradient(45deg, #ffffff, var(--neon-cyan)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 5px; 
        }
        .logo-bottom { 
            font-size: 18px; 
            font-weight: 700; 
            color: var(--neon-pink); 
            letter-spacing: 8px; 
            text-transform: uppercase; 
            margin-bottom: 35px; 
        }

        input { 
            width: 100%; 
            padding: 18px; 
            margin: 10px 0; 
            background: rgba(15, 23, 42, 0.6); 
            border: 2px solid #1e293b; 
            border-radius: 12px; 
            color: #fff; 
            font-size: 18px; 
            outline: none; 
            box-sizing: border-box; 
        }
        
        button { 
            width: 100%; 
            padding: 18px; 
            margin-top: 20px; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 700; 
            cursor: pointer; 
            background: linear-gradient(45deg, #0056b3, var(--neon-cyan)); 
            color: white; 
            transition: 0.3s; 
        }
        
        #result { display: none; margin-top: 30px; border: 1px dashed var(--neon-cyan); padding: 20px; border-radius: 16px; text-align: left; }
        .info { font-size: 16px; margin: 10px 0; }
        .val { font-size: 28px; font-weight: 900; color: var(--neon-cyan); display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>MT DANCE STUDIO</h1>
    <input type="text" id="name" placeholder="請輸入姓名">
    <input type="number" id="phone" placeholder="請輸入手機末三碼">
    <button id="btn" onclick="query()">查詢剩餘課程</button>
    <div id="result">
        <p>剩餘堂數: <span id="count">-</span></p>
        <p>到期日期: <span id="date">-</span></p>
    </div>
</div>

<script>
    // 請將這裡換成您 GAS 部署後的 Web App URL (結尾為 /exec)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyNNNRJK1duf5WLOEk-8UL2Q1JzDLzOyDv2u8BQd8SbAkzNKGrQyXTYTom4CKlzUSD7XA/exec"; 

    async function query() {
    const btn = document.getElementById('btn');
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    
    // 將參數透過 URL 傳遞，避開 POST 的跨域限制
    const url = `${GAS_URL}?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`;
    
    btn.innerText = "查詢中...";
    try {
        const response = await fetch(url); // 改用 GET
        const data = await response.json();
        
        document.getElementById('count').innerText = data.remaining;
        document.getElementById('date').innerText = data.expiry;
        document.getElementById('result').style.display = "block";
    } catch(e) {
        alert("查詢失敗，請檢查網路");
    } finally {
        btn.innerText = "查詢剩餘課程";
    }
}
</script>
</body>
</html>

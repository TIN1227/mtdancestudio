<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT DANCE STUDIO | 學員查詢系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a192f;
            --card-bg: rgba(16, 39, 74, 0.65);
            --primary-blue: #007bff;
            --neon-cyan: #00f0ff;
            --neon-pink: #ff4081;
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #060d1a 0%, #0a192f 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 背景霓虹光暈裝飾 */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
        }
        body::before { top: -50px; left: -50px; background: var(--primary-blue); }
        body::after { bottom: -50px; right: -50px; background: var(--neon-pink); }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 123, 255, 0.2);
            z-index: 1;
            text-align: center;
            position: relative;
        }

        /* LOGO 區塊 */
        .logo-area {
            margin-bottom: 30px;
        }
        .logo-text {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ffffff 30%, var(--neon-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        .logo-sub {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--neon-pink);
            margin-top: 5px;
            font-weight: 700;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 25px;
            color: #cbd5e1;
            font-weight: 400;
        }

        /* 表單與輸入框樣式 */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }
        label {
            display: block;
            font-size: 13px;
            color: var(--neon-cyan);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 18px;
            transition: color 0.3s;
        }
        input, select {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid #1e293b;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        }
        input:focus + i, select:focus ~ i {
            color: var(--neon-cyan);
        }

        /* 按鈕樣式 */
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .btn-query {
            background: linear-gradient(45deg, #0056b3, var(--primary-blue));
            color: white;
            margin-top: 10px;
        }
        .btn-query:hover {
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.6);
            transform: translateY(-2px);
        }
        .btn-checkin {
            background: linear-gradient(45deg, #d81b60, var(--neon-pink));
            color: white;
            margin-top: 15px;
        }
        .btn-checkin:hover {
            box-shadow: 0 0 15px rgba(255, 64, 129, 0.6);
            transform: translateY(-2px);
        }

        /* 查詢結果面板（動態顯示） */
        .result-panel {
            background: rgba(15, 23, 42, 0.8);
            border: 1px dashed var(--neon-cyan);
            border-radius: 16px;
            padding: 20px;
            margin: 25px 0;
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .student-name {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }
        .student-count {
            font-size: 14px;
            color: #94a3b8;
        }
        .count-number {
            font-size: 36px;
            font-weight: 900;
            color: var(--neon-cyan);
            margin: 5px 5px 0 5px;
            display: inline-block;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        /* 載入中動畫 */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 遮罩/提示訊息 */
        .overlay-msg {
            color: var(--neon-pink);
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>MT DANCE STUDIO</h1>
    <input type="text" id="name" placeholder="請輸入姓名">
    <input type="number" id="phone" placeholder="請輸入手機末三碼">
    <button id="btn" onclick="query()">查詢剩餘課程</button>
    <div id="result">
        <p>剩餘堂數: <span id="count">-</span></p>
        <p>到期日期: <span id="date">-</span></p>
    </div>
</div>

<script>
    // 1. 請填入您的 Google Apps Script Web App URL
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyNNNRJK1duf5WLOEk-8UL2Q1JzDLzOyDv2u8BQd8SbAkzNKGrQyXTYTom4CKlzUSD7XA/exec";

    // JSONP 請求核心函數
    function sendJsonpRequest(url, callbackName) {
        return new Promise((resolve, reject) => {
            window[callbackName] = (data) => {
                delete window[callbackName];
                document.body.removeChild(script);
                resolve(data);
            };
            const script = document.createElement('script');
            script.src = `${url}${url.includes('?') ? '&' : '?'}callback=${callbackName}`;
            script.onerror = reject;
            document.body.appendChild(script);
        });
    }

    async function query() {
        const btn = document.getElementById('btn');
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;

        if (!name || !phone) { alert("請完整輸入姓名與手機末三碼"); return; }

        btn.innerText = "查詢中...";
        btn.disabled = true;

        try {
            // 呼叫 JSONP (網址帶參數)
            const url = `${GAS_API_URL}?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`;
            const data = await sendJsonpRequest(url, "jsonp_query_" + Date.now());

            if (data.status === "success") {
                document.getElementById('result').style.display = 'block';
                document.getElementById('count').innerText = data.remaining;
                document.getElementById('date').innerText = data.expiry;
            } else {
                alert("查無資料，請洽櫃檯");
                document.getElementById('result').style.display = 'none';
            }
        } catch (err) {
            alert("伺服器連線異常，請稍後再試");
        } finally {
            btn.innerText = "查詢剩餘課程";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
